<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Mobbin — UI & UX design inspiration for mobile & web apps</title>
  <meta name="description" content="Save hours of UI & UX research with our library of 400,000+ fully searchable mobile & web app screenshots."/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bg-primary': '#0f0f0f',
            'bg-secondary': '#1a1a1a',
            'bg-tertiary': '#242424',
            'text-primary': '#f5f5f5',
            'text-secondary': '#a3a3a3',
            'text-tertiary': '#6b6b6b',
            'border-color': '#2e2e2e',
            'accent-blue': '#4f8ef7',
          },
          borderRadius: {
            '12': '12px',
            '16': '16px',
            '24': '24px',
            '28': '28px',
            '32': '32px',
          },
          fontSize: {
            'showcase': ['4.5rem', { lineHeight: '1.1', fontWeight: '700', letterSpacing: '-0.03em' }],
            'spotlight': ['3rem', { lineHeight: '1.1', fontWeight: '700', letterSpacing: '-0.03em' }],
            'title-1': ['2rem', { lineHeight: '1.15', fontWeight: '700', letterSpacing: '-0.02em' }],
            'feature': ['1.125rem', { lineHeight: '1.5', fontWeight: '400' }],
            'feature-bold': ['1.125rem', { lineHeight: '1.5', fontWeight: '600' }],
            'body-bold': ['0.9375rem', { lineHeight: '1.5', fontWeight: '600' }],
            'compact': ['0.8125rem', { lineHeight: '1.4', fontWeight: '400' }],
          },
          spacing: {
            '8': '8px',
            '12': '12px',
            '16': '16px',
            '20': '20px',
            '24': '24px',
            '28': '28px',
            '32': '32px',
            '36': '36px',
            '40': '40px',
            '44': '44px',
            '48': '48px',
            '60': '60px',
            '64': '64px',
            '80': '80px',
          },
          screens: {
            'min-720': '720px',
            'min-1280': '1280px',
            'min-1536': '1536px',
          },
          backdropBlur: {
            'xl': '24px',
          },
          boxShadow: {
            'inset-1': 'inset 0 0 0 1px',
            'logo-inset': 'inset 0 0 0 1px rgba(255,255,255,0.08)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'float-delayed': 'float 6s ease-in-out 2s infinite',
            'float-delayed-2': 'float 6s ease-in-out 4s infinite',
            'scroll-left': 'scrollLeft 40s linear infinite',
            'scroll-right': 'scrollRight 40s linear infinite',
            'shine': 'shine 3s ease-in-out 1s infinite',
            'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            scrollLeft: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            },
            scrollRight: {
              '0%': { transform: 'translateX(-50%)' },
              '100%': { transform: 'translateX(0)' },
            },
            shine: {
              '0%': { left: '-120%' },
              '100%': { left: '200%' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #0f0f0f;
      color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    :root {
      --neutral-5: 240 5% 96%;
      --neutral-30: 240 5% 65%;
      --blue-60: 217 91% 60%;
    }

    .glass-nav {
      background: rgba(20, 20, 20, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .text-gradient {
      background: linear-gradient(135deg, #f5f5f5 0%, #a3a3a3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-glow {
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(79, 142, 247, 0.15), transparent);
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      transition: all 0.3s ease;
    }

    .feature-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
    }

    .btn-primary {
      background: #f5f5f5;
      color: #0f0f0f;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.9375rem;
      padding: 0 16px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover {
      background: #e0e0e0;
    }

    .btn-secondary {
      background: transparent;
      color: #f5f5f5;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.9375rem;
      padding: 0 16px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease;
      text-decoration: none;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .app-logo {
      border-radius: 22px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .scroll-track {
      display: flex;
      gap: 12px;
      width: max-content;
    }

    .scroll-container {
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    }

    .animate-scroll-left {
      animation: scrollLeft 50s linear infinite;
    }

    .animate-scroll-right {
      animation: scrollRight 50s linear infinite;
    }

    @keyframes scrollLeft {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @keyframes scrollRight {
      0% { transform: translateX(-50%); }
      100% { transform: translateX(0); }
    }

    .shine-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -120%;
      width: 50%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      transform: skewX(-45deg);
      animation: shine 4s ease-in-out 1s infinite;
    }

    @keyframes shine {
      0% { left: -120%; }
      30% { left: 200%; }
      100% { left: 200%; }
    }

    .fade-in-up {
      animation: fadeInUp 0.7s ease-out forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in-up-delay-1 { animation-delay: 0.1s; opacity: 0; }
    .fade-in-up-delay-2 { animation-delay: 0.2s; opacity: 0; }
    .fade-in-up-delay-3 { animation-delay: 0.3s; opacity: 0; }
    .fade-in-up-delay-4 { animation-delay: 0.4s; opacity: 0; }

    .logo-stack-item {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      overflow: hidden;
    }

    .pricing-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      transition: all 0.3s ease;
    }

    .pricing-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
    }

    .pricing-card.featured {
      background: rgba(79, 142, 247, 0.08);
      border-color: rgba(79, 142, 247, 0.3);
    }

    .testimonial-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 20px;
      padding: 24px;
      min-width: 320px;
      max-width: 320px;
    }

    .screen-card {
      border-radius: 16px;
      overflow: hidden;
      background: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .mobile-menu {
      display: none;
      flex-direction: column;
      gap: 12px;
      padding: 16px 20px 20px;
    }

    .mobile-menu.open {
      display: flex;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .tab-btn {
      padding: 8px 16px;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #a3a3a3;
      background: transparent;
      border: none;
    }

    .tab-btn.active {
      background: rgba(255, 255, 255, 0.1);
      color: #f5f5f5;
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .accordion-content.open {
      max-height: 500px;
    }

    .accordion-icon {
      transition: transform 0.3s ease;
    }

    .accordion-item.open .accordion-icon {
      transform: rotate(45deg);
    }

    .product-preview {
      background: #1a1a1a;
      border-radius: 16px 16px 0 0;
      overflow: hidden;
    }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.08);
      color: #a3a3a3;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b6b6b;
    }

    .footer-link {
      color: #6b6b6b;
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s ease;
    }

    .footer-link:hover {
      color: #f5f5f5;
    }

    .nav-link {
      color: #f5f5f5;
      text-decoration: none;
      font-size: 0.9375rem;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }

    .nav-link:hover {
      opacity: 0.7;
    }

    .company-logo {
      height: 20px;
      opacity: 0.4;
      filter: brightness(10);
      transition: opacity 0.2s ease;
    }

    .company-logo:hover {
      opacity: 0.7;
    }

    .screen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    @media (min-width: 720px) {
      .screen-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
    }

    .overflow-clip {
      overflow: clip;
    }

    .bg-background-primary { background-color: #0f0f0f; }
    .bg-background-secondary { background-color: #1a1a1a; }
    .bg-background-tertiary { background-color: #242424; }
    .bg-background-inverse { background-color: #f5f5f5; }
    .text-text-primary { color: #f5f5f5; }
    .text-text-secondary { color: #a3a3a3; }
    .text-text-tertiary { color: #6b6b6b; }
    .text-text-inverse { color: #0f0f0f; }

    .rounded-b-32 { border-bottom-left-radius: 32px; border-bottom-right-radius: 32px; }
    .rounded-24 { border-radius: 24px; }

    .min-h-screen { min-height: 100vh; }

    .isolate { isolation: isolate; }

    .search-bar {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 16px;
      color: #f5f5f5;
      font-size: 0.9375rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .search-bar:focus {
      border-color: rgba(79, 142, 247, 0.5);
    }

    .search-bar::placeholder {
      color: #6b6b6b;
    }

    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 9999px;
      font-size: 0.8125rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.06);
      color: #a3a3a3;
      border: 1px solid rgba(255, 255, 255, 0.08);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .platform-badge.active, .platform-badge:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #f5f5f5;
      border-color: rgba(255, 255, 255, 0.15);
    }

    .gradient-overlay {
      background: linear-gradient(to bottom, transparent 60%, #0f0f0f 100%);
    }

    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 0.9375rem;
      color: #a3a3a3;
    }

    .check-item .check-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(79, 142, 247, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .check-item .check-icon i {
      font-size: 10px;
      color: #4f8ef7;
    }

    .number-stat {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #f5f5f5;
      line-height: 1;
    }

    @media (min-width: 720px) {
      .number-stat {
        font-size: 4rem;
      }
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.07);
    }

    .toggle-switch {
      width: 48px;
      height: 28px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .toggle-switch.on {
      background: #4f8ef7;
    }

    .toggle-knob {
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform 0.2s ease;
    }

    .toggle-switch.on .toggle-knob {
      transform: translateX(20px);
    }

    .sticky-nav {
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .nav-container {
      position: absolute;
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      z-index: 10;
    }

    .hero-section {
      padding-top: 108px;
      padding-bottom: 64px;
    }

    @media (min-width: 720px) {
      .hero-section {
        padding-top: 156px;
        padding-bottom: 80px;
      }
    }

    @media (min-width: 1280px) {
      .hero-section {
        padding-top: 180px;
        padding-bottom: 96px;
      }
    }

    .mobile-nav-wrapper {
      position: absolute;
      left: 24px;
      top: 8px;
      z-index: 10;
      width: calc(100vw - 48px);
      border-radius: 28px;
    }

    @media (min-width: 720px) {
      .mobile-nav-wrapper {
        display: none;
      }
    }

    .desktop-nav-wrapper {
      display: none;
    }

    @media (min-width: 720px) {
      .desktop-nav-wrapper {
        display: flex;
        position: absolute;
        left: 50%;
        top: 24px;
        transform: translateX(-50%);
        z-index: 10;
        height: 60px;
        width: 584px;
        border-radius: 9999px;
        align-items: center;
        gap: 24px;
        padding: 8px 24px;
      }
    }

    .mobbin-logo-text {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #f5f5f5;
    }

    .hero-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      text-align: center;
      max-width: 300px;
    }

    @media (min-width: 720px) {
      .hero-title {
        font-size: 3rem;
        max-width: 500px;
      }
    }

    @media (min-width: 1280px) {
      .hero-title {
        font-size: 4.5rem;
        max-width: 700px;
      }
    }

    .hero-subtitle {
      font-size: 1rem;
      color: #a3a3a3;
      text-align: center;
      max-width: 240px;
      line-height: 1.6;
    }

    @media (min-width: 720px) {
      .hero-subtitle {
        max-width: 340px;
        font-size: 1.125rem;
      }
    }

    @media (min-width: 1280px) {
      .hero-subtitle {
        max-width: 640px;
      }
    }

    .section-title {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    @media (min-width: 720px) {
      .section-title {
        font-size: 2.5rem;
      }
    }

    @media (min-width: 1280px) {
      .section-title {
        font-size: 3.5rem;
      }
    }

    .feature-section-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    @media (min-width: 720px) {
      .feature-section-title {
        font-size: 2rem;
      }
    }

    .app-logo-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    @media (min-width: 720px) {
      .app-logo-grid {
        grid-template-columns: repeat(8, 1fr);
        gap: 12px;
      }
    }

    @media (min-width: 1280px) {
      .app-logo-grid {
        grid-template-columns: repeat(12, 1fr);
        gap: 16px;
      }
    }

    .app-logo-item {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 20px;
      overflow: hidden;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .app-logo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .flow-screen {
      border-radius: 12px;
      overflow: hidden;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.06);
      aspect-ratio: 9/19.5;
    }

    .flow-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .web-screen {
      border-radius: 12px;
      overflow: hidden;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.06);
      aspect-ratio: 16/10;
    }

    .web-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .pricing-toggle-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 9999px;
      padding: 4px;
    }

    .pricing-toggle-btn {
      padding: 8px 20px;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #a3a3a3;
      background: transparent;
      border: none;
    }

    .pricing-toggle-btn.active {
      background: rgba(255,255,255,0.1);
      color: #f5f5f5;
    }

    .save-badge {
      background: rgba(79, 142, 247, 0.15);
      color: #4f8ef7;
      border: 1px solid rgba(79, 142, 247, 0.3);
      border-radius: 9999px;
      padding: 2px 10px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .faq-item {
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .faq-question {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #f5f5f5;
    }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
      color: #a3a3a3;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    .faq-answer.open {
      max-height: 300px;
      padding-bottom: 20px;
    }

    .faq-icon {
      transition: transform 0.3s ease;
      color: #6b6b6b;
      flex-shrink: 0;
    }

    .faq-item.open .faq-icon {
      transform: rotate(45deg);
    }

    .social-link {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a3a3a3;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .social-link:hover {
      background: rgba(255,255,255,0.1);
      color: #f5f5f5;
    }

    .product-tab-content {
      display: none;
    }

    .product-tab-content.active {
      display: block;
    }

    .product-tab-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #6b6b6b;
      background: transparent;
      border: none;
      text-align: left;
      width: 100%;

    .product-tabs-inner {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 9999px;
      padding: 4px;
    }

    .product-tab {
      padding: 8px 20px;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #6b6b6b;
      background: transparent;
      border: none;
    }

    .product-tab.active {
      background: rgba(255,255,255,0.1);
      color: #f5f5f5;
    }

    .product-tab:hover:not(.active) {
      color: #a3a3a3;
    }

    .product-tab-panel {
      display: none;
    }

    .product-tab-panel.active {
      display: block;
    }

    .product-preview-container {
      background: #1a1a1a;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .product-preview-header {
      background: #141414;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .product-preview-dots {
      display: flex;
      gap: 6px;
    }

    .product-preview-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .product-preview-dot.red { background: #ff5f57; }
    .product-preview-dot.yellow { background: #febc2e; }
    .product-preview-dot.green { background: #28c840; }

    .product-preview-url {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.75rem;
      color: #6b6b6b;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .product-preview-body {
      display: flex;
      height: 400px;
    }

    @media (min-width: 720px) {
      .product-preview-body {
        height: 500px;
      }
    }

    .product-preview-sidebar {
      width: 200px;
      background: #111111;
      border-right: 1px solid rgba(255,255,255,0.06);
      padding: 16px 12px;
      flex-shrink: 0;
      overflow: hidden;
    }

    @media (max-width: 719px) {
      .product-preview-sidebar {
        display: none;
      }
    }

    .product-preview-content {
      flex: 1;
      padding: 16px;
      overflow: hidden;
    }

    .sidebar-section-title {
      font-size: 0.6875rem;
      font-weight: 600;
      color: #4b4b4b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      padding: 0 8px;
    }

    .sidebar-nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 8px;
      font-size: 0.8125rem;
      color: #6b6b6b;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 2px;
    }

    .sidebar-nav-item:hover, .sidebar-nav-item.active {
      background: rgba(255,255,255,0.06);
      color: #f5f5f5;
    }

    .sidebar-nav-item i {
      font-size: 0.75rem;
      width: 16px;
      text-align: center;
    }

    .sidebar-app-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 0.8125rem;
      color: #6b6b6b;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 2px;
    }

    .sidebar-app-item:hover {
      background: rgba(255,255,255,0.06);
      color: #f5f5f5;
    }

    .sidebar-app-logo {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      overflow: hidden;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    .sidebar-app-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content-search-bar {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 14px;
      color: #f5f5f5;
      font-size: 0.875rem;
      width: 100%;
      outline: none;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .content-search-bar-text {
      color: #6b6b6b;
      font-size: 0.875rem;
    }

    .content-filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .content-filter-row::-webkit-scrollbar {
      display: none;
    }

    .content-filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .content-filter-chip.active {
      background: rgba(255,255,255,0.12);
      color: #f5f5f5;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .content-filter-chip.inactive {
      background: rgba(255,255,255,0.04);
      color: #6b6b6b;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .content-screens-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    @media (min-width: 720px) {
      .content-screens-grid {
        grid-template-columns: repeat(6, 1fr);
      }
    }

    .content-screen-item {
      aspect-ratio: 9/19.5;
      border-radius: 8px;
      overflow: hidden;
      background: #2a2a2a;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .content-screen-item:hover {
      transform: scale(1.03);
    }

    .content-screen-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content-web-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    @media (min-width: 720px) {
      .content-web-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .content-web-item {
      aspect-ratio: 16/10;
      border-radius: 8px;
      overflow: hidden;
      background: #2a2a2a;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .content-web-item:hover {
      transform: scale(1.02);
    }

    .content-web-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
